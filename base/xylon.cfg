// "g_commandMapZoom" is:"0.10" default:"0.25"
// command map zoom level
seta g_commandMapZoom "0.10"

// "g_commandMapZoomStep" is:"0.05" default:"0.125"
// percent to increase/decrease command map zoom by
seta g_commandMapZoomStep "0.05"

// "g_waypointSizeMin" is:"16" default:"16"
// min world-view icon size
seta g_waypointSizeMax "16"

// "g_waypointSizeMax" is:"16" default:"32"
// max world-view icon size
seta g_waypointSizeMax "16"

// "g_playerIconSize" is:"20" default:"20"
// Size of the screen space player icons
seta g_playerIconSize "10"


// "net_clientMaxRate" is:"32767" default:"16000"
// maximum rate requested by client from server in bytes/sec
// (2^15 - 1) = 32767)
seta net_clientMaxRate "32767"

// "net_serverMaxClientRate" is:"32767" default:"16000"
// maximum rate to a client in bytes/sec
// (2^15 - 1) = 32767)
seta net_serverMaxClientRate "32767"

// "net_clientPrediction" is:"0" default:"20"
// additional client side prediction in milliseconds
net_clientPrediction "0"

// "net_predictionErrorDecay" is:"0" default:"1"
// Enable/disable prediction error decay
net_predictionErrorDecay "0"


// "m_pitch" is:"0.0165" default:"0.022"
// mouse pitch scale
seta m_pitch "0.0165"


// "com_useFastVidRestart" is:"1" default:"0"
// Allow use of fast vid restarts
seta com_useFastVidRestart "1"

// "com_unlock_timingMethod" is:"0" default:"2"
// method of timing interpolated/extrapolated frames: 0 = whenever they fit;  1 = on boundaries of
// framerate /multiples of 30;  2 = like 1, but using total previous everything time to estimate,
// not just render time
seta com_unlock_timingMethod "0"

//"com_unlock_maxFPS" is:"0" default:"60"
//maximum FPS unlock will try to reach (only works in timing methods 1 & 2) - zero = no limit
seta com_unlock_timingMethod "0"


